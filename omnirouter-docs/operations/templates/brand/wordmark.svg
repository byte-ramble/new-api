<svg viewBox="0 0 600 110" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OmniRouter wordmark">
  <defs>
    <linearGradient id="wmGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="60%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
  </defs>

  <!-- Brand name in cyberpunk-styled type -->
  <text x="0" y="72"
        font-family="'Audiowide', 'Rajdhani', 'Orbitron', monospace"
        font-size="64" font-weight="900"
        fill="url(#wmGrad)" letter-spacing="2">OmniRouter</text>

  <!-- Terminal underscore — gives the wordmark a "shell prompt" feel -->
  <line x1="0" y1="92" x2="540" y2="92"
        stroke="#06B6D4" stroke-width="2" opacity="0.6"/>

  <!-- Blinking cursor at the end -->
  <rect x="544" y="36" width="8" height="50"
        fill="#EC4899" opacity="0.95">
    <animate attributeName="opacity" values="0.95;0.15;0.95"
             dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
