<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="OmniRouter HexCore logo">
  <defs>
    <linearGradient id="hexgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="60%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer hex frame -->
  <polygon points="100,15 173,57 173,143 100,185 27,143 27,57"
           fill="none" stroke="url(#hexgrad)" stroke-width="6"
           stroke-linejoin="round" filter="url(#glow)"/>

  <!-- 6 outgoing arrowheads on each edge midpoint (Omni = 6 directions) -->
  <g fill="url(#hexgrad)">
    <polygon points="100,3 90,17 110,17"/>          <!-- top -->
    <polygon points="197,57 178,52 184,68"/>        <!-- top right -->
    <polygon points="197,143 184,132 178,148"/>     <!-- bottom right -->
    <polygon points="100,197 110,183 90,183"/>      <!-- bottom -->
    <polygon points="3,143 22,148 16,132"/>         <!-- bottom left -->
    <polygon points="3,57 16,68 22,52"/>            <!-- top left -->
  </g>

  <!-- Inner core hex (dark) -->
  <polygon points="100,55 134,75 134,125 100,145 66,125 66,75"
           fill="#0F172A" stroke="#22D3EE" stroke-width="1.5"/>

  <!-- O letterform inside the core -->
  <text x="100" y="116" font-family="'Audiowide', 'Rajdhani', system-ui, sans-serif"
        font-size="46" font-weight="900" fill="url(#hexgrad)"
        text-anchor="middle" letter-spacing="-2">O</text>

  <!-- Subtle scanline (cyberpunk visor across the core) -->
  <rect x="66" y="98" width="68" height="2" fill="#EC4899" opacity="0.5"/>
</svg>
